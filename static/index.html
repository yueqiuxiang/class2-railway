<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI聊天机器人</title>
    <style>
        body{max-width:800px;margin:30px auto;padding:0 20px;font-family:Arial}
        #chat{border:1px solid #ddd;height:400px;padding:15px;overflow-y:auto;border-radius:8px}
        .user{text-align:right;color:#2196F3;margin:8px 0}
        .bot{text-align:left;color:#333;margin:8px 0}
        #input{display:flex;gap:10px;margin-top:10px}
        #msg{flex:1;padding:10px;border:1px solid #ddd;border-radius:4px}
        button{padding:10px 20px;background:#2196F3;color:white;border:none;border-radius:4px}
    </style>
</head>
<body>
    <h1>AI客服机器人</h1>
    <div id="chat"></div>
    <div id="input">
        <input type="text" id="msg" placeholder="输入问题...">
        <button onclick="send()">发送</button>
    </div>

    <script>
        async function send() {
            let msg = document.getElementById("msg").value;
            if(!msg) return;

            let chat = document.getElementById("chat");
            chat.innerHTML += `<div class='user'>你：${msg}</div>`;

            let res = await fetch("/chat", {
                method: "POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({question: msg})
            });
            let data = await res.json();
            chat.innerHTML += `<div class='bot'>AI：${data.answer}</div>`;
            document.getElementById("msg").value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
